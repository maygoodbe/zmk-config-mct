# 1. Hardware Power & Display
CONFIG_ZMK_DISPLAY=y
CONFIG_ZMK_DISPLAY_STATUS_SCREEN_BUILT_IN=y
# Ensures the left (central) doesn't lag while trying to talk to the right
CONFIG_ZMK_DISPLAY_WORK_QUEUE_DEDICATED=y

# 2. Fix the "Flickering" / Connection Issues
CONFIG_ZMK_BLE_EXPERIMENTAL_FEATURES=y
# Increase transmit power to prevent drops
CONFIG_BT_CTLR_TX_PWR_PLUS_8=y

# 3. Explicitly set split to Bluetooth (Taking TRRS out of picture)
CONFIG_ZMK_SPLIT=y
CONFIG_ZMK_SPLIT_BLE=y
CONFIG_ZMK_SPLIT_WIRED=n

# 4. Widgets
CONFIG_ZMK_WIDGET_LAYER_STATUS=y
CONFIG_ZMK_WIDGET_BATTERY_STATUS=y
CONFIG_ZMK_WIDGET_OUTPUT_STATUS=y

# Ensure external power is explicitly ON
CONFIG_ZMK_EXT_POWER=y

# Specifically for nice!nano: Ensure the 3.3V out is boosted/active
CONFIG_ZMK_RGB_UNDERGLOW_EXT_POWER=y

# Increase the I2C drive strength (helps on some Pro-Micro clones)
CONFIG_I2C_NRFX_TWI_DRV_FLAGS=1